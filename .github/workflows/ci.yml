name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bun tsc --noEmit

      - name: Lint
        run: bun lint || echo "No lint script configured"

  test-database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1

      - name: Install dependencies
        run: bun install

      - name: Test database initialization
        run: |
          mkdir -p /tmp/grievance-scout
          AUDIT_DB_PATH=/tmp/grievance-scout/test.db bun run scripts/init.ts

      - name: Verify database schema
        run: |
          sqlite3 /tmp/grievance-scout/test.db ".tables"
          sqlite3 /tmp/grievance-scout/test.db "SELECT COUNT(*) FROM search_terms"

  test-coverage:
    runs-on: ubuntu-latest
    needs: test-database
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests with coverage
        run: bun run test:coverage --reporter=junit --output=./coverage/junit.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            coverage/
            *.lcov

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        if: github.event_name == 'push'
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Test Results
          path: coverage/junit.xml
          reporter: jest-junit